spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    url: ${DB_URL}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    out-of-order: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# --- 여긴 spring 밖(최상위) ---
jwt:
  key: ${JWT_KEY}
  access:
    expiration: ${ACCESS_EXP:900000}
  refresh:
    expiration: ${REFRESH_EXP:1209600000}
    reissue-threshold: ${REFRESH_REISSUE_THRESHOLD:259200000}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    region:
      static: ${S3_REGION:ap-southeast-2}
      auto: false
    stack:
      auto: false

security:
  aes:
    key: ${AES_KEY:}

  jwt:
    secret-key: ${JWT_SECRET_KEY:plango-jwt-secret-key-change-me-please-very-long}
    access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY:1800}
    refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY:1209600}

  preview:
    api:
      url: ${PREVIEW_API_URL:http://localhost:3000}

  oauth2:
    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      redirect-uri: ${KAKAO_REDIRECT_URI}
