spring:
  config:
    activate:
      on-profile: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/plango_local?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root            # 👉 네 로컬 MySQL 계정
    password: root            # 👉 네 로컬 MySQL 비밀번호

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update        # 개발용이라 update로 두면 테이블 자동 생성
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect   # 👉 Dialect 직접 지정
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: false            # 로컬 테스트에선 일단 꺼두자

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
    region:
      static: ${S3_REGION:ap-southeast-2}
      auto: false
    stack:
      auto: false

security:
  aes:
    key: ${AES_KEY:}

preview:
  api:
    url: ${PREVIEW_API_URL:http://localhost:3000}

jwt:
  key: "this-is-local-jwt-secret-key-please-change-1234567890"  # 로컬용 임의 시크릿 (32자 이상)
  access:
    expiration: 3600000        # 액세스 토큰 유효기간 (ms 단위, 예: 1시간 = 60 * 60 * 1000)
  refresh:
    expiration: 1209600000     # 리프레시 토큰 유효기간 (ms, 예: 14일 = 14 * 24 * 60 * 60 * 1000)

