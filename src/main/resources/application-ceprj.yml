spring:
  config:
    activate:
      on-profile: ceprj

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db25328?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: dbid253
    password: dbpass253

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate          # Flyway로 DDL 관리하니까 validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

# ===== JWT 설정 (서버용) =====
jwt:
  # 실제 서비스라면 환경변수로 빼야겠지만,
  # 학과 서버 테스트용이라 일단 디폴트 값도 넣어두자
  key: ${JWT_KEY:this-is-ceprj-jwt-secret-key-change-me-1234567890}
  access:
    # ms 단위 (기본 1시간)
    expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh:
    # ms 단위 (기본 14일)
    expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

# ===== S3 설정 (없는 경우 빈값으로 둠) =====
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
    region:
      static: ${S3_REGION:ap-southeast-2}
      auto: false
    stack:
      auto: false

# ===== AES 키 (암호화 쪽에서 사용) =====
security:
  aes:
    key: ${AES_KEY:dummy-aes-key-for-ceprj-only}

# ===== 프리뷰 API (프론트에서 호출 시) =====
preview:
  api:
    url: ${PREVIEW_API_URL:http://localhost:3000}
